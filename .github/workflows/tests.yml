name: BharatRAG Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface/hub/
        key: hf-models-${{ runner.os }}-${{ hashFiles('bharatrag/embeddings/indic_embeddings.py') }}
        restore-keys: |
          hf-models-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install "pytest>=7.0,<9.0"

    - name: Run tests
      run: |
        pytest tests/ -v